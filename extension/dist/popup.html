<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      background: #09090b;
      color: #fafafa;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }
    .header {
      padding: 16px;
      border-bottom: 1px solid #27272a;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo { font-weight: 600; font-size: 14px; }
    .status {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 99px;
      background: rgba(20,184,166,0.12);
      color: #14b8a6;
    }
    .status.off { background: rgba(113,113,122,0.15); color: #71717a; }
    .body { padding: 16px; }
    .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .label { color: #a1a1aa; }
    .value { font-weight: 500; }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
    }
    .btn-primary { background: #14b8a6; color: #fff; }
    .btn-secondary { background: #18181b; color: #a1a1aa; border: 1px solid #27272a; }
    .footer { padding: 12px 16px; border-top: 1px solid #27272a; }
    #login-section input {
      width: 100%; padding: 8px 10px; border-radius: 8px;
      background: #18181b; border: 1px solid #27272a;
      color: #fafafa; font-size: 12px; margin-bottom: 8px; outline: none;
    }
    #error { font-size: 11px; color: #ef4444; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">LifeLens</span>
    <span class="status" id="status-badge">Active</span>
  </div>

  <div class="body" id="main-section" style="display:none">
    <div class="row"><span class="label">Tracking</span><span class="value" id="tracking-val">On</span></div>
    <div class="row"><span class="label">Events today</span><span class="value" id="events-val">—</span></div>
    <button class="btn btn-primary" id="open-dashboard">Open dashboard</button>
    <button class="btn btn-secondary" id="sign-out">Sign out</button>
  </div>

  <div class="body" id="login-section">
    <p style="color:#a1a1aa; margin-bottom:12px;">Sign in to activate LifeLens.</p>
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />
    <button class="btn btn-primary" id="sign-in">Sign in</button>
    <p id="error"></p>
  </div>

  <script src="popup.js"></script>
</body>
</html>
